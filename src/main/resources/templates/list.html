<html lang="ko" layout:decorate="~{layout}">
<head>
    <title th:text="|글 목록|"></title>
</head>
<th:block layout:fragment="content">
    <h1>글 목록</h1>
    <ul>
        <li th:each="post : ${posts}">
            <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.id} + '. ' + ${post.title}"></a>
        </li>
    </ul>
</th:block>
